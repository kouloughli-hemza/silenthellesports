<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silent Hell — Hero Plane Drop (Tier 2 Reference)</title>
<style>
body { margin: 0; background: #050203; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; font-family: 'Inter', system-ui, sans-serif; }
.ht2-root {
  --black: #0A0A0A;
  --hell-red: #E60013;
  --ember: #FF4500;
  --bone: #F5F0E8;
  --ash-1: #1F1F1F;
  --ash-2: #2A2A2A;
  --ash-3: #141414;
  --gold: #FFD93D;
  background: var(--black);
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid var(--ash-2);
  width: 100%;
  max-width: 900px;
  font-family: 'Inter', system-ui, sans-serif;
  color: var(--bone);
}
.ht2-root *, .ht2-root *::before, .ht2-root *::after { box-sizing: border-box; }
.ht2-mono { font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; }
.ht2-h { padding: 14px 18px; border-bottom: 1px solid var(--ash-2); background: var(--ash-3); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.ht2-h-tag { font-size: 9px; letter-spacing: 0.3em; color: var(--hell-red); text-transform: uppercase; }
.ht2-h-title { font-size: 16px; font-weight: 700; font-style: italic; margin-top: 2px; }
.ht2-play { background: var(--hell-red); color: var(--bone); font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; padding: 9px 16px; border: none; cursor: pointer; font-weight: 700; transition: background 150ms; }
.ht2-play:hover { background: var(--ember); }
.ht2-play:disabled { opacity: 0.5; cursor: wait; }
.ht2-stage { position: relative; height: 540px; overflow: hidden; background: #000; perspective: 800px; }
.ht2-sky-far { position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 30%, #2a0a14 0%, #14050a 35%, #050203 70%, #000 100%); }
.ht2-sky-mid { position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 80%, rgba(230,0,19,0.08) 0%, transparent 60%); }
.ht2-canvas-stars { position: absolute; inset: 0; pointer-events: none; }
.ht2-cloud { position: absolute; height: 30px; opacity: 0.3; will-change: transform; }
.ht2-cloud-back { background: radial-gradient(ellipse at center, rgba(60,30,40,0.6) 0%, transparent 70%); width: 200px; height: 50px; opacity: 0.35; }
.ht2-cloud-mid { background: radial-gradient(ellipse at center, rgba(80,40,50,0.7) 0%, transparent 70%); width: 280px; height: 60px; opacity: 0.4; }
.ht2-cloud-near { background: radial-gradient(ellipse at center, rgba(100,50,60,0.5) 0%, transparent 70%); width: 360px; height: 80px; opacity: 0.3; }
.ht2-haze { position: absolute; bottom: 0; left: 0; right: 0; height: 35%; background: linear-gradient(to top, rgba(230,0,19,0.18) 0%, rgba(230,0,19,0.08) 30%, transparent 100%); pointer-events: none; }
.ht2-haze-2 { position: absolute; bottom: 0; left: 0; right: 0; height: 18%; background: linear-gradient(to top, rgba(255,69,0,0.25) 0%, transparent 100%); pointer-events: none; }
.ht2-horizon { position: absolute; bottom: 12%; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent 0%, rgba(230,0,19,0.4) 50%, transparent 100%); }
.ht2-plane-wrap { position: absolute; top: 26%; left: -240px; will-change: transform; transform-style: preserve-3d; }
.ht2-plane-tilt { transform-origin: center; will-change: transform; }
.ht2-canvas-smoke { position: absolute; inset: 0; pointer-events: none; }
.ht2-trooper { position: absolute; left: 38%; top: 28%; opacity: 0; will-change: transform, opacity; transform-origin: center top; }
.ht2-chute-svg { transform-origin: 50% 100%; }
.ht2-canvas-fx { position: absolute; inset: 0; pointer-events: none; }
.ht2-ground-line { position: absolute; bottom: 14%; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent 0%, var(--hell-red) 50%, transparent 100%); opacity: 0; transform: scaleX(0); transform-origin: center; }
.ht2-shockwave { position: absolute; left: 50%; bottom: 14%; width: 80px; height: 12px; border: 2px solid var(--ember); border-radius: 50%; transform: translate(-50%, 50%) scale(0); opacity: 0; pointer-events: none; }
.ht2-shockwave-2 { border-color: var(--hell-red); }
.ht2-impact-flash { position: absolute; left: 50%; bottom: 14%; width: 600px; height: 600px; transform: translate(-50%, 50%) scale(0); border-radius: 50%; background: radial-gradient(circle, rgba(255,217,61,0.5) 0%, rgba(255,69,0,0.4) 25%, rgba(230,0,19,0.2) 50%, transparent 70%); opacity: 0; pointer-events: none; mix-blend-mode: screen; }
.ht2-screen-flash { position: absolute; inset: 0; background: var(--hell-red); opacity: 0; pointer-events: none; mix-blend-mode: screen; }
.ht2-logo-wrap { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); pointer-events: none; opacity: 0; will-change: transform, opacity; z-index: 10; }
.ht2-logo-bg { position: absolute; left: 50%; top: 50%; width: 200px; height: 200px; transform: translate(-50%, -50%); background: radial-gradient(circle, rgba(230,0,19,0.4) 0%, transparent 60%); pointer-events: none; }
.ht2-logo-svg { position: relative; will-change: transform; }
.ht2-tagline { position: absolute; bottom: 60px; left: 0; right: 0; text-align: center; opacity: 0; will-change: opacity; }
.ht2-tag-text { font-size: 13px; letter-spacing: 0.15em; color: var(--bone); font-style: italic; opacity: 0.85; }
.ht2-tag-cursor { display: inline-block; width: 7px; height: 14px; background: var(--hell-red); margin-left: 3px; vertical-align: middle; animation: ht2-blink 0.7s steps(2) infinite; }
@keyframes ht2-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
.ht2-hud-tl { position: absolute; top: 14px; left: 16px; font-size: 9px; letter-spacing: 0.3em; color: var(--bone); opacity: 0; }
.ht2-hud-tr { position: absolute; top: 14px; right: 16px; font-size: 9px; letter-spacing: 0.3em; color: var(--hell-red); opacity: 0; display: flex; align-items: center; gap: 6px; }
.ht2-live-dot { width: 6px; height: 6px; background: var(--hell-red); border-radius: 50%; animation: ht2-pulse 1s infinite; }
@keyframes ht2-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
.ht2-hud-bl { position: absolute; bottom: 14px; left: 16px; font-size: 9px; letter-spacing: 0.3em; color: var(--bone); opacity: 0; }
.ht2-bracket { position: absolute; width: 22px; height: 22px; border: 1.5px solid var(--hell-red); opacity: 0; }
.ht2-br-tl { top: 8px; left: 8px; border-right: none; border-bottom: none; }
.ht2-br-tr { top: 8px; right: 8px; border-left: none; border-bottom: none; }
.ht2-br-bl { bottom: 8px; left: 8px; border-right: none; border-top: none; }
.ht2-br-br { bottom: 8px; right: 8px; border-left: none; border-top: none; }
.ht2-shake { position: absolute; inset: 0; will-change: transform; }
.ht2-vignette { position: absolute; inset: 0; pointer-events: none; background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.3) 70%, rgba(0,0,0,0.7) 100%); }
.ht2-grain { position: absolute; inset: 0; pointer-events: none; opacity: 0.4; mix-blend-mode: overlay; background-image: radial-gradient(circle at 25% 30%, rgba(255,255,255,0.03) 0%, transparent 40%), radial-gradient(circle at 75% 70%, rgba(255,255,255,0.025) 0%, transparent 40%); }
.ht2-foot { padding: 12px 18px; background: var(--ash-3); font-size: 11px; color: rgba(245,240,232,0.6); display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
.ht2-foot-tag { color: var(--gold); letter-spacing: 0.2em; font-size: 9px; font-family: 'JetBrains Mono', monospace; font-weight: 700; }
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
(function() {
  function init() {
    if (typeof gsap === 'undefined') { setTimeout(init, 50); return; }
    const stage = document.getElementById('ht2-stage');
    if (!stage) return;
    const starsCanvas = document.getElementById('ht2-canvas-stars');
    const starsCtx = starsCanvas.getContext('2d');
    const stars = [];
    function resizeAll() {
      const rect = stage.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      [starsCanvas, document.getElementById('ht2-canvas-smoke'), document.getElementById('ht2-canvas-fx')].forEach(c => {
        c.width = rect.width * dpr; c.height = rect.height * dpr;
        c.style.width = rect.width + 'px'; c.style.height = rect.height + 'px';
        c.getContext('2d').setTransform(1, 0, 0, 1, 0, 0);
        c.getContext('2d').scale(dpr, dpr);
      });
      stars.length = 0;
      for (let i = 0; i < 80; i++) {
        stars.push({ x: Math.random() * rect.width, y: Math.random() * rect.height * 0.6, size: Math.random() * 1.2 + 0.3, baseAlpha: 0.2 + Math.random() * 0.5, twinkle: Math.random() * Math.PI * 2, twinkleSpeed: 0.01 + Math.random() * 0.03 });
      }
    }
    resizeAll();
    function drawStars() {
      const rect = stage.getBoundingClientRect();
      starsCtx.clearRect(0, 0, rect.width, rect.height);
      stars.forEach(s => {
        s.twinkle += s.twinkleSpeed;
        const alpha = s.baseAlpha * (0.7 + 0.3 * Math.sin(s.twinkle));
        starsCtx.fillStyle = `rgba(245,240,232,${alpha})`;
        starsCtx.beginPath(); starsCtx.arc(s.x, s.y, s.size, 0, Math.PI * 2); starsCtx.fill();
      });
    }
    const smokeCanvas = document.getElementById('ht2-canvas-smoke');
    const smokeCtx = smokeCanvas.getContext('2d');
    let smokeParticles = [];
    function spawnSmokeFromTrooper() {
      const trooper = document.getElementById('ht2-trooper');
      const rect = stage.getBoundingClientRect();
      const tRect = trooper.getBoundingClientRect();
      const x = tRect.left - rect.left + tRect.width / 2;
      const y = tRect.top - rect.top + tRect.height * 0.85;
      for (let i = 0; i < 2; i++) {
        smokeParticles.push({ x: x + (Math.random() - 0.5) * 4, y: y + Math.random() * 3, vx: (Math.random() - 0.5) * 0.3, vy: 0.2 + Math.random() * 0.3, life: 1, decay: 0.005 + Math.random() * 0.008, size: 3 + Math.random() * 5, growRate: 0.15, color: Math.random() < 0.5 ? [230, 0, 19] : [255, 69, 0] });
      }
    }
    const fxCanvas = document.getElementById('ht2-canvas-fx');
    const fxCtx = fxCanvas.getContext('2d');
    let fxParticles = [];
    let dustParticles = [];
    function spawnImpactDust() {
      const rect = stage.getBoundingClientRect();
      const cx = rect.width / 2, cy = rect.height * 0.86;
      for (let i = 0; i < 120; i++) {
        const angle = (Math.random() - 0.5) * Math.PI * 0.6 + (Math.random() < 0.5 ? 0 : Math.PI);
        const speed = 4 + Math.random() * 9;
        dustParticles.push({ x: cx + (Math.random() - 0.5) * 30, y: cy + (Math.random() - 0.5) * 8, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed * 0.3 - Math.random() * 1.5, life: 1, decay: 0.004 + Math.random() * 0.008, size: 4 + Math.random() * 8, growRate: 0.3, color: [120, 60, 40] });
      }
      for (let i = 0; i < 60; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 3 + Math.random() * 10;
        fxParticles.push({ x: cx, y: cy, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - Math.random() * 4, life: 1, decay: 0.012 + Math.random() * 0.015, size: 1 + Math.random() * 2, gravity: 0.15, drag: 0.97, color: Math.random() < 0.5 ? [255, 217, 61] : [255, 69, 0], trail: true });
      }
      for (let i = 0; i < 40; i++) {
        fxParticles.push({ x: cx + (Math.random() - 0.5) * 80, y: cy + (Math.random() - 0.5) * 6, vx: (Math.random() - 0.5) * 1.5, vy: -2 - Math.random() * 3, life: 1, decay: 0.005 + Math.random() * 0.008, size: 1 + Math.random() * 1.8, gravity: -0.02, drag: 0.99, color: [230, 0, 19], trail: false, flicker: Math.random() * Math.PI * 2 });
      }
    }
    let sceneEmbers = [];
    function spawnSceneEmber() {
      const rect = stage.getBoundingClientRect();
      sceneEmbers.push({ x: Math.random() * rect.width, y: rect.height + 4, vx: (Math.random() - 0.5) * 0.4, vy: -0.3 - Math.random() * 0.7, life: 1, decay: 0.003 + Math.random() * 0.005, size: 0.6 + Math.random() * 1.2, flicker: Math.random() * Math.PI * 2, color: Math.random() < 0.7 ? [255, 69, 0] : [230, 0, 19] });
    }
    let raf = null, smokeActive = false;
    function tick() {
      const rect = stage.getBoundingClientRect();
      drawStars();
      smokeCtx.clearRect(0, 0, rect.width, rect.height);
      if (smokeActive) spawnSmokeFromTrooper();
      for (let i = smokeParticles.length - 1; i >= 0; i--) {
        const p = smokeParticles[i];
        p.x += p.vx; p.y += p.vy; p.size += p.growRate; p.life -= p.decay;
        if (p.life <= 0) { smokeParticles.splice(i, 1); continue; }
        const alpha = p.life * 0.55;
        const grad = smokeCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
        grad.addColorStop(0, `rgba(${p.color[0]},${p.color[1]},${p.color[2]},${alpha})`);
        grad.addColorStop(1, `rgba(${p.color[0]},${p.color[1]},${p.color[2]},0)`);
        smokeCtx.fillStyle = grad;
        smokeCtx.beginPath(); smokeCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2); smokeCtx.fill();
      }
      fxCtx.clearRect(0, 0, rect.width, rect.height);
      if (Math.random() < 0.5) spawnSceneEmber();
      for (let i = sceneEmbers.length - 1; i >= 0; i--) {
        const e = sceneEmbers[i];
        e.x += e.vx; e.y += e.vy; e.life -= e.decay; e.flicker += 0.15;
        if (e.life <= 0 || e.y < -10) { sceneEmbers.splice(i, 1); continue; }
        const flick = 0.6 + 0.4 * Math.sin(e.flicker);
        const alpha = e.life * flick * 0.7;
        fxCtx.fillStyle = `rgba(${e.color[0]},${e.color[1]},${e.color[2]},${alpha})`;
        fxCtx.beginPath(); fxCtx.arc(e.x, e.y, e.size, 0, Math.PI * 2); fxCtx.fill();
        fxCtx.fillStyle = `rgba(${e.color[0]},${e.color[1]},${e.color[2]},${alpha * 0.2})`;
        fxCtx.beginPath(); fxCtx.arc(e.x, e.y, e.size * 3, 0, Math.PI * 2); fxCtx.fill();
      }
      for (let i = dustParticles.length - 1; i >= 0; i--) {
        const p = dustParticles[i];
        p.vx *= 0.96; p.vy = p.vy * 0.96 + 0.05;
        p.x += p.vx; p.y += p.vy; p.size += p.growRate; p.life -= p.decay;
        if (p.life <= 0) { dustParticles.splice(i, 1); continue; }
        const alpha = p.life * 0.4;
        const grad = fxCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
        grad.addColorStop(0, `rgba(${p.color[0]},${p.color[1]},${p.color[2]},${alpha})`);
        grad.addColorStop(1, `rgba(${p.color[0]},${p.color[1]},${p.color[2]},0)`);
        fxCtx.fillStyle = grad;
        fxCtx.beginPath(); fxCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2); fxCtx.fill();
      }
      for (let i = fxParticles.length - 1; i >= 0; i--) {
        const p = fxParticles[i];
        p.vx *= p.drag; p.vy = p.vy * p.drag + p.gravity;
        p.x += p.vx; p.y += p.vy; p.life -= p.decay;
        if (p.flicker !== undefined) p.flicker += 0.2;
        if (p.life <= 0) { fxParticles.splice(i, 1); continue; }
        const flick = p.flicker !== undefined ? (0.7 + 0.3 * Math.sin(p.flicker)) : 1;
        const alpha = p.life * flick;
        if (p.trail) {
          fxCtx.strokeStyle = `rgba(${p.color[0]},${p.color[1]},${p.color[2]},${alpha * 0.5})`;
          fxCtx.lineWidth = p.size * 0.5;
          fxCtx.beginPath(); fxCtx.moveTo(p.x - p.vx * 2, p.y - p.vy * 2); fxCtx.lineTo(p.x, p.y); fxCtx.stroke();
        }
        fxCtx.fillStyle = `rgba(${p.color[0]},${p.color[1]},${p.color[2]},${alpha})`;
        fxCtx.beginPath(); fxCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2); fxCtx.fill();
        if (p.trail) {
          fxCtx.fillStyle = `rgba(${p.color[0]},${p.color[1]},${p.color[2]},${alpha * 0.2})`;
          fxCtx.beginPath(); fxCtx.arc(p.x, p.y, p.size * 2.5, 0, Math.PI * 2); fxCtx.fill();
        }
      }
      raf = requestAnimationFrame(tick);
    }
    tick();
    const shakeEl = document.getElementById('ht2-shake');
    function shakeStage(intensity, duration) {
      const tl = gsap.timeline();
      const steps = Math.floor(duration / 0.04);
      for (let i = 0; i < steps; i++) {
        const damping = 1 - (i / steps);
        tl.to(shakeEl, { x: (Math.random() - 0.5) * intensity * damping, y: (Math.random() - 0.5) * intensity * damping, duration: 0.04, ease: 'none' });
      }
      tl.to(shakeEl, { x: 0, y: 0, duration: 0.04 });
      return tl;
    }
    function startCloudDrift() {
      const rect = stage.getBoundingClientRect();
      const clouds = [
        { id: 'ht2-cloud-1', dur: 60, delay: 0 }, { id: 'ht2-cloud-2', dur: 80, delay: -20 },
        { id: 'ht2-cloud-3', dur: 45, delay: -10 }, { id: 'ht2-cloud-4', dur: 50, delay: -30 },
        { id: 'ht2-cloud-5', dur: 30, delay: -5 }, { id: 'ht2-cloud-6', dur: 35, delay: -15 }
      ];
      clouds.forEach(c => {
        const el = document.getElementById(c.id);
        if (!el) return;
        gsap.fromTo(el, { x: -400 }, { x: rect.width + 400, duration: c.dur, ease: 'none', repeat: -1, delay: c.delay });
      });
    }
    startCloudDrift();
    const tagText = "The last sound you don't hear.";
    let typeTimer = null;
    function typeTagline() {
      const el = document.getElementById('ht2-tag-text');
      if (!el) return;
      el.textContent = '';
      let i = 0;
      function step() {
        if (i <= tagText.length) { el.textContent = tagText.slice(0, i); i++; typeTimer = setTimeout(step, 45); }
      }
      step();
    }
    function play() {
      const btn = document.getElementById('ht2-replay');
      if (btn) { btn.disabled = true; btn.textContent = '◉ Playing'; }
      gsap.set('#ht2-plane', { x: -240, y: 0 });
      gsap.set('#ht2-plane-tilt', { rotation: 2, scale: 1 });
      gsap.set('#ht2-trooper', { x: 0, y: 0, opacity: 0, scale: 0.7, rotation: 0 });
      gsap.set('#ht2-chute', { scaleY: 0, scaleX: 1 });
      gsap.set('#ht2-logo', { opacity: 0, scale: 0.2, y: 20 });
      gsap.set('#ht2-logo-svg', { rotation: 0 });
      gsap.set('#ht2-tagline', { opacity: 0 });
      gsap.set('#ht2-tag-text', { textContent: '' });
      gsap.set('#ht2-screen-flash', { opacity: 0 });
      gsap.set('#ht2-impact-flash', { scale: 0, opacity: 0 });
      gsap.set(['#ht2-shockwave-1', '#ht2-shockwave-2', '#ht2-shockwave-3'], { scale: 0, opacity: 0 });
      gsap.set('#ht2-ground-line', { scaleX: 0, opacity: 0 });
      gsap.set('.ht2-bracket', { opacity: 0, scale: 0.5 });
      gsap.set(['.ht2-hud-tl', '.ht2-hud-tr', '.ht2-hud-bl'], { opacity: 0 });
      gsap.set(shakeEl, { x: 0, y: 0 });
      smokeActive = false; smokeParticles = []; fxParticles = []; dustParticles = [];
      if (typeTimer) clearTimeout(typeTimer);
      const stageRect = stage.getBoundingClientRect();
      const tl = gsap.timeline({ onComplete: () => { if (btn) { btn.disabled = false; btn.textContent = '▸ Replay'; } } });
      tl.to('#ht2-plane', { x: stageRect.width + 240, duration: 5.5, ease: 'none' }, 0);
      tl.to('#ht2-plane-tilt', { rotation: -2, duration: 5.5, ease: 'sine.inOut' }, 0);
      tl.to('#ht2-trooper', { opacity: 1, scale: 0.9, duration: 0.2, ease: 'power2.out' }, 1.6);
      tl.to('#ht2-trooper', { y: 60, rotation: 25, duration: 0.6, ease: 'power2.in' }, 1.6);
      tl.to('#ht2-chute', { scaleY: 1.15, duration: 0.25, ease: 'back.out(2.5)' }, 2.2);
      tl.to('#ht2-chute', { scaleY: 1, duration: 0.15, ease: 'power1.out' }, 2.45);
      tl.to('#ht2-trooper', { y: 40, rotation: 0, scale: 1, duration: 0.3, ease: 'power2.out' }, 2.2);
      tl.to('#ht2-chute', { rotation: 4, duration: 0.6, ease: 'sine.inOut', repeat: 5, yoyo: true, transformOrigin: '50% 100%' }, 2.5);
      tl.to('#ht2-trooper', { y: stageRect.height * 0.55, x: 30, duration: 3.0, ease: 'power1.in' }, 2.5);
      tl.add(() => { smokeActive = true; }, 2.3);
      tl.add(() => { smokeActive = false; }, 5.4);
      tl.to('.ht2-bracket', { opacity: 1, scale: 1, duration: 0.4, ease: 'back.out(2)', stagger: 0.05 }, 3.0);
      tl.to(['.ht2-hud-tl', '.ht2-hud-tr', '.ht2-hud-bl'], { opacity: 0.7, duration: 0.5, ease: 'power2.out', stagger: 0.1 }, 3.2);
      const impactTime = 5.5;
      tl.to('#ht2-trooper', { opacity: 0, duration: 0.05 }, impactTime);
      tl.add(() => { spawnImpactDust(); }, impactTime);
      tl.to('#ht2-screen-flash', { opacity: 0.7, duration: 0.08, ease: 'power2.out' }, impactTime);
      tl.to('#ht2-screen-flash', { opacity: 0, duration: 0.4, ease: 'power2.in' }, impactTime + 0.08);
      tl.to('#ht2-impact-flash', { scale: 1, opacity: 1, duration: 0.2, ease: 'power2.out' }, impactTime);
      tl.to('#ht2-impact-flash', { opacity: 0, duration: 0.7, ease: 'power2.in' }, impactTime + 0.2);
      tl.to('#ht2-shockwave-1', { scale: 6, opacity: 0.9, duration: 0.5, ease: 'power2.out' }, impactTime);
      tl.to('#ht2-shockwave-1', { opacity: 0, duration: 0.4, ease: 'power2.in' }, impactTime + 0.3);
      tl.to('#ht2-shockwave-2', { scale: 9, opacity: 0.7, duration: 0.7, ease: 'power2.out' }, impactTime + 0.1);
      tl.to('#ht2-shockwave-2', { opacity: 0, duration: 0.5, ease: 'power2.in' }, impactTime + 0.4);
      tl.to('#ht2-shockwave-3', { scale: 12, opacity: 0.4, duration: 0.9, ease: 'power2.out' }, impactTime + 0.2);
      tl.to('#ht2-shockwave-3', { opacity: 0, duration: 0.5, ease: 'power2.in' }, impactTime + 0.6);
      tl.to('#ht2-ground-line', { scaleX: 1, opacity: 1, duration: 0.4, ease: 'power3.out' }, impactTime);
      tl.to('#ht2-ground-line', { opacity: 0.3, duration: 0.5 }, impactTime + 0.5);
      tl.add(shakeStage(28, 0.7), impactTime);
      const logoTime = impactTime + 0.4;
      tl.to('#ht2-logo', { opacity: 1, scale: 1, y: 0, duration: 0.6, ease: 'back.out(1.6)' }, logoTime);
      tl.to('#ht2-logo-svg', { scale: 1.05, duration: 0.4, ease: 'sine.inOut', repeat: 1, yoyo: true }, logoTime + 0.6);
      tl.add(shakeStage(8, 0.4), logoTime);
      tl.to('#ht2-tagline', { opacity: 1, duration: 0.4, ease: 'power2.out' }, logoTime + 0.7);
      tl.add(typeTagline, logoTime + 0.7);
      return tl;
    }
    document.getElementById('ht2-replay').addEventListener('click', () => play());
    setTimeout(play, 400);
    window.addEventListener('resize', resizeAll);
  }
  init();
})();
</script>
</body>
</html>
